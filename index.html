<!DOCTYPE html>
<html>
<head>
  <title>Cyber Dashboard</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .title {
      font-size: 20px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .counter {
      font-size: 72px;
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="title">PASAULINĖS TINKLO ATAKOS</div>

  <div class="counter" id="counter">
    Kraunama...
  </div>

<script>
  async function loadData() {

    const response = await fetch("/api/stats");

    const data = await response.json();

    document.getElementById("counter").innerText =
      Number(data.attacks).toLocaleString("lt-LT");
  }

  loadData();

  setInterval(loadData, 60000);
</script>

</body>
</html>
